# content/briefs.yaml — 20 blog-post briefs
# Each post generates EN + HI independent versions + 1 hero image

common:
  author: "Aarambha"
  brand_voice: |
    Confident collective voice. Warm. Data-backed. Never corporate.
    Hinglish-friendly English.

    HARD RULES — all mandatory:
    1. NEVER use first-person singular. NO "I", "me", "my", "मैं", "मेरा", "मुझे", "मुझसे".
       Replace ALL with "we" / "our" / "us" / "हम" / "हमारा" / "हमें".
    2. NEVER invent autobiographical stories (no "I remember", "my mother", "when I was a
       child in a village", "मेरी माँ", "मेरा गाँव"). The founder story stays on /about/
       and uses anonymous third-person structure there too.
    3. NO personal names, NO employer names (Fortune 500 is fine as a category, no
       specific company), NO city/village names (India, Bharat, gaon are fine; specific
       place names are not).
    4. Always "we" / "Aarambha". If a sentence seems to require "I", rewrite it as a
       collective observation or a data-point.
    5. Examples of correct replacement:
       - WRONG: "I remember when my mother called me" → RIGHT: "A message from home, from a
         parent, from a student — that's how this starts for many of us."
       - WRONG: "मैं ये बना रहा हूँ" → RIGHT: "हम यह बना रहे हैं"
       - WRONG: "I've spent 22 years in AI" → RIGHT: "After two decades in enterprise AI"
         or "The team has spent decades building AI".
  target_length: [1200, 1500]   # words per language
  image_style: |
    Editorial dark illustration. Cosmos-navy #060d1a background.
    Amber #f59e0b and sky-blue #0ea5e9 accents only. Premium magazine
    quality. Restrained. One subject. Generous negative space.
    NO text, NO logos, NO watermarks.

