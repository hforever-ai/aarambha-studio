    \ trained on English and retrofitted. That's the difference.</p></div>\n</li>\n<li class=\"flex items-start gap-4 bg-card/50\
    \ border border-white/[.07] rounded-xl p-5\">\n<span class=\"text-2xl flex-shrink-0\">♿</span>\n<div><div class=\"text-gray-100\
