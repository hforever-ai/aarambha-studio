    <div class="text-gray-300 font-semibold mb-3 hindi">छात्र रटते हैं। समझ कुछ नहीं।</div>

    <p class="text-sm text-gray-400 leading-relaxed hindi">250 मिलियन से ज़्यादा स्कूली छात्र हैं। ज़्यादातर प्राइवेट ट्यूटर
    नहीं रख सकते। हमारा सिस्टम रटने पर ज़ोर देता है, सोचने पर नहीं।</p>

    </article>

    <article class="bg-card border border-white/[.07] rounded-2xl p-8 relative overflow-hidden">

    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-primary to-accent"></div>

    <div class="text-5xl md:text-6xl font-black text-gray-200 mb-2 leading-none hindi">63M</div>

    <div class="text-gray-300 font-semibold mb-3 hindi">MSMEs के पास AI commerce tools नहीं</div>

    <p class="text-sm text-gray-400 leading-relaxed hindi">WhatsApp + Excel. बस यही है उनका stack. Aarambha का अगला प्रोडक्ट
    इसे ठीक करेगा।</p>

    </article>

    </div>

    <p class="mt-12 text-center hindi text-xl md:text-2xl font-semibold text-accent">हम यहाँ हैं — यह gap मिटाने के लिए।</p>

    </div>

    </section>'
