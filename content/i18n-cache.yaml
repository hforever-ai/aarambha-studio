  en: '<section class="bg-dark py-24 px-4 md:px-8">

    <div class="max-w-3xl mx-auto">

    <div class="text-center mb-14">

    <h2 class="text-3xl md:text-5xl font-black mb-3 grad">The Journey</h2>

    <p class="text-gray-400">Eight beats. No names. Universal by design.</p>

    </div>

    <ol class="relative border-l-2 border-accent/30 pl-7 md:pl-10 space-y-5">

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">🌱 Start</div>

    <p class="text-gray-300 leading-relaxed">Ek gaon. Ek kamra. Ek sapna — engineer banna.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">🎓 College</div>

    <p class="text-gray-300 leading-relaxed">Pehli generation jo shahar gayi. Engineering complete. Aankhon mein duniya.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">💼 First Job</div>

    <p class="text-gray-300 leading-relaxed">Software engineer. Chhota office. Bada seekhna.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">✈️ Departure</div>

    <p class="text-gray-300 leading-relaxed">Ek call aaya. Bahar jaane ka mauka. Haan bol diya.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">🏢 22 Years</div>

    <p class="text-gray-300 leading-relaxed">Fortune 500 companies. Kafka architectures. Search systems. AI pipelines. Unke
    liye banaya jinke paas sab tha. Jinke paas nahi tha — unke baare mein koi nahi socha.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">📱 The Message</div>

    <p class="text-gray-300 leading-relaxed">Ek WhatsApp aaya. Ghar se. "Yahan teacher nahi hai. Bacche samajh nahi pa rahe.
    Koi app nahi jo Hindi mein samjhaye." 22 saal enterprise AI. Ek message.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2">💡 The Question</div>

    <p class="text-gray-300 leading-relaxed">"Yeh sab gaon tak kyun nahi pahuncha?" Yeh sawaal — raat bhar nahi sone diya.</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_#0ea5e9]"></span>

    <div class="bg-gradient-to-br from-primary/10 to-accent/5 border border-primary/30 rounded-xl p-5 md:p-6">

    <div class="text-xs text-primary font-bold uppercase tracking-[.18em] mb-2">🌅 Aarambha</div>

    <p class="text-gray-200 leading-relaxed font-medium">India mein AI ki aarambha. Unke liye jo peeche reh gaye — nahi kyunki
    woh kam the, balki kyunki tools unki bhasha nahi bolte the.</p>

    </div>

    </li>

    </ol>

    </div>

    </section>'
  hi: '<section class="bg-dark py-24 px-4 md:px-8 hindi">

    <div class="max-w-3xl mx-auto">

    <div class="text-center mb-14">

    <h2 class="text-3xl md:text-5xl font-black mb-3 grad hindi">हमारी यात्रा</h2>

    <p class="text-gray-400 hindi">आठ पड़ाव। कोई नाम नहीं। डिज़ाइन से ही सार्वभौमिक।</p>

    </div>

    <ol class="relative border-l-2 border-accent/30 pl-7 md:pl-10 space-y-5">

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">🌱 शुरुआत</div>

    <p class="text-gray-300 leading-relaxed hindi">एक गाँव। एक कमरा। एक सपना — इंजीनियर बनना।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">🎓 कॉलेज</div>

    <p class="text-gray-300 leading-relaxed hindi">पहली पीढ़ी जो शहर गई। इंजीनियरिंग पूरी हुई। आँखों में दुनिया थी।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">💼 पहली नौकरी</div>

    <p class="text-gray-300 leading-relaxed hindi">सॉफ्टवेयर इंजीनियर। छोटा ऑफिस। बड़ी सीख मिली।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">✈️ प्रस्थान</div>

    <p class="text-gray-300 leading-relaxed hindi">एक कॉल आया। बाहर जाने का मौका मिला। हाँ बोल दिया।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">🏢 22 साल</div>

    <p class="text-gray-300 leading-relaxed hindi">Fortune 500 कंपनियों के लिए काम किया। Kafka आर्किटेक्चर। सर्च सिस्टम। AI
    पाइपलाइन। उनके लिए बनाया जिनके पास सब कुछ था। जिनके पास नहीं था — उनके बारे में किसी ने नहीं सोचा।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">📱 वह संदेश</div>

    <p class="text-gray-300 leading-relaxed hindi">एक WhatsApp आया। घर से। "यहाँ टीचर नहीं है। बच्चे समझ नहीं पा रहे। कोई
    ऐप नहीं जो हिंदी में समझाए।" 22 साल Enterprise AI में काम किया। बस एक संदेश।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-accent shadow-[0_0_10px_#f59e0b]"></span>

    <div class="bg-card/50 border border-white/[.07] rounded-xl p-5 md:p-6">

    <div class="text-xs text-accent font-bold uppercase tracking-[.18em] mb-2 hindi">💡 वह सवाल</div>

    <p class="text-gray-300 leading-relaxed hindi">"यह सब गाँव तक क्यों नहीं पहुँचा?" इस सवाल ने — रात भर सोने नहीं दिया।</p>

    </div>

    </li>

    <li class="relative">

    <span class="absolute -left-[34px] md:-left-[44px] top-4 w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_#0ea5e9]"></span>

    <div class="bg-gradient-to-br from-primary/10 to-accent/5 border border-primary/30 rounded-xl p-5 md:p-6">

    <div class="text-xs text-primary font-bold uppercase tracking-[.18em] mb-2 hindi">🌅 Aarambha</div>

    <p class="text-gray-200 leading-relaxed font-medium hindi">भारत में AI की Aarambha। उनके लिए जो पीछे रह गए — इसलिए नहीं
    कि वे कम थे, बल्कि इसलिए कि टूल्स उनकी भाषा नहीं बोलते थे।</p>

    </div>

    </li>

    </ol>

    </div>

    </section>'
dec4f974eeee0ca0:
  page: about/index.html
  en: '<section class="bg-cosmos py-24 px-4 md:px-8">

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">

    <div>

    <p class="inline-block px-3 py-1 rounded-full border border-white/[.12] bg-white/[.04] text-xs font-bold text-gray-400
    tracking-[.18em] uppercase mb-4">The Gap</p>

    <h3 class="text-2xl md:text-3xl font-black mb-4 text-gray-100">Ek paradox.</h3>

    <p class="text-gray-400 leading-relaxed">India mein ek paradox hai. 1.4 billion log. 200 million English speakers. Har
    AI tool unke liye bana. 1.2 billion? Left behind. Intelligence ki kami nahi — tools ki bhasha galat thi.</p>

    </div>

    <div>

    <p class="inline-block px-3 py-1 rounded-full border border-primary/30 bg-primary/5 text-xs font-bold text-primary tracking-[.18em]
    uppercase mb-4">The Answer</p>

    <h3 class="text-2xl md:text-3xl font-black mb-4 text-gray-100">Reimagination.</h3>

    <p class="text-gray-400 leading-relaxed">SAAVI didi kabhi nahi bolti: "See the diagram." Woh bolti hai: "Ek circle socho..."
    Yeh fark hai. Translation nahi — reimagination. Aarambha 1.2 billion ke liye banata hai.</p>

    </div>

    </div>

    </section>'
  hi: '<section class="bg-cosmos py-24 px-4 md:px-8 hindi">

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">

    <div>

    <p class="inline-block px-3 py-1 rounded-full border border-white/[.12] bg-white/[.04] text-xs font-bold text-gray-400
    tracking-[.18em] uppercase mb-4 hindi">समस्या</p>

    <h3 class="text-2xl md:text-3xl font-black mb-4 text-gray-100 hindi">एक विरोधाभास।</h3>

    <p class="text-gray-400 leading-relaxed hindi">भारत में एक विरोधाभास है। 1.4 अरब लोग। 200 मिलियन इंग्लिश बोलने वाले। हर
    AI टूल उन्हीं के लिए बना। 1.2 अरब? पीछे छूट गए। इंटेलिजेंस की कमी नहीं — टूल्स की भाषा गलत थी।</p>

    </div>

    <div>

    <p class="inline-block px-3 py-1 rounded-full border border-primary/30 bg-primary/5 text-xs font-bold text-primary tracking-[.18em]
    uppercase mb-4 hindi">समाधान</p>

    <h3 class="text-2xl md:text-3xl font-black mb-4 text-gray-100 hindi">पुनर्कल्पना।</h3>

    <p class="text-gray-400 leading-relaxed hindi">SAAVI दीदी कभी नहीं बोलतीं: "See the diagram." वो बोलती हैं: "एक सर्कल
    सोचो..." यह फर्क है। ट्रांसलेशन नहीं — पुनर्कल्पना। Aarambha 1.2 अरब लोगों के लिए बनाता है।</p>

    </div>

    </div>

    </section>'
d2cd566c2705185c:
  page: about/index.html
  en: '<section class="bg-dark py-24 px-4 md:px-8">

    <div class="max-w-6xl mx-auto">

    <div class="text-center mb-12">

    <p class="inline-block px-3 py-1 rounded-full border border-white/[.12] bg-white/[.04] text-xs font-bold text-gray-400
    tracking-[.18em] uppercase mb-4">Values</p>

    <h2 class="text-3xl md:text-4xl font-black">How we build.</h2>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

    <article class="bg-card border border-white/[.07] rounded-2xl p-7">

    <div class="text-3xl mb-3">🎯</div>

    <h3 class="text-lg font-bold text-gray-100 mb-2">Build for Real India</h3>

    <p class="text-gray-400 text-sm leading-relaxed">Tier 2/3/4, not metro conferences. Villages, Hindi medium, unmetro India.</p>

    </article>

