    <div class="text-5xl md:text-6xl font-black text-primary mb-2 leading-none hindi">1.2B+</div>

    <div class="text-gray-300 font-semibold mb-3 hindi">भारतीयों के लिए कोई native AI नहीं</div>

    <p class="text-sm text-gray-400 leading-relaxed hindi">कुल 1.4 अरब लोग हैं। 200 मिलियन इंग्लिश बोलते हैं। 1.2 अरब लोग
