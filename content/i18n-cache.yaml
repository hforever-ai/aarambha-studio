    \ ne kaha: Main 22 ghante kaam karunga. 2 ghante kulhaadi tej karunga.<br/>\n<br/>\n      Din bhar kaam kiya.<br/>\n<span\
    \ class=\"text-accent font-bold not-italic\">22 ghante wale ne zyada lakdi kaati.</span><br/>\n<br/>\n      Kyunki tez\
    \ kulhaadi — thodi mehnat mein zyada karta hai.\n    </blockquote>\n<div class=\"grid grid-cols-1 md:grid-cols-3 gap-5\
    \ mb-14\">\n<article class=\"bg-card border border-white/[.07] rounded-2xl p-6 hover:border-accent/40 transition-all\"\
    >\n<div class=\"text-3xl mb-3\">⏸️</div>\n<div class=\"text-xs text-accent font-bold uppercase tracking-[.14em] mb-2\"\
    >Pause to Sharpen</div>\n<h3 class=\"text-lg font-bold text-gray-100 mb-2\">Stop. Reflect. Rebuild.</h3>\n<p class=\"\
    text-gray-400 text-sm leading-relaxed\">No feature ships until it's right. We'd rather delay than ship broken.</p>\n</article>\n\
    <article class=\"bg-card border border-white/[.07] rounded-2xl p-6 hover:border-accent/40 transition-all\">\n<div class=\"\
    text-3xl mb-3\">\U0001F3AF</div>\n<div class=\"text-xs text-accent font-bold uppercase tracking-[.14em] mb-2\">Optimize\
    \ First</div>\n<h3 class=\"text-lg font-bold text-gray-100 mb-2\">Don't scale broken things.</h3>\n<p class=\"text-gray-400\
    \ text-sm leading-relaxed\">Fix the core until it's perfect, then 10x it. Scale amplifies flaws.</p>\n</article>\n<article\
    \ class=\"bg-card border border-white/[.07] rounded-2xl p-6 hover:border-accent/40 transition-all\">\n<div class=\"text-3xl\
    \ mb-3\">\U0001F525</div>\n<div class=\"text-xs text-accent font-bold uppercase tracking-[.14em] mb-2\">Build Right</div>\n\
