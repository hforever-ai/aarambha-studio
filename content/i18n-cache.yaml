  en: "<section class=\"bg-dark py-24 px-4 md:px-8\">\n<div class=\"max-w-4xl mx-auto\">\n<h2 class=\"text-3xl md:text-5xl\
    \ font-black mb-10\">22/7 — <span class=\"grad\">The Woodcutter Principle</span></h2>\n<blockquote class=\"border-l-4\
    \ border-accent bg-card/50 rounded-r-2xl italic text-gray-300 p-6 md:p-8 text-lg md:text-xl leading-relaxed mb-12\">\n\
